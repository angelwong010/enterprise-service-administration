server:
  port: 8080

# Logs: nivel por paquete y formato en consola
logging:
  level:
    root: INFO
    com.hvati.administration: INFO          # Tus servicios y controllers (cambia a DEBUG para más detalle)
    com.hvati.administration.service: INFO # Incluye [updateQuotation], etc.
    com.hvati.administration.controller: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO               # Opcional: ver SQL generado (quita o pon WARN en producción)
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  application:
    name: enterprise-service-administration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth-develop.hvati.cloud/realms/hvati

keycloak:
  admin:
    server-url: https://auth-develop.hvati.cloud
    realm: hvati
    client-id: ${KC_CLIENT_ID:hvati-backend}
    client-secret: ${KC_CLIENT_SECRET:kGD5spfFSbOqcZJmifHZKv7GLrimFB8r}

app:
  cors:
    allowed-origins: http://localhost:4200,https://hvati.cloud

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
