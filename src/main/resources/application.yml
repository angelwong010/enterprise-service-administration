server:
  port: 8080

spring:
  application:
    name: enterprise-service-administration

  datasource:
    url: jdbc:postgresql://localhost:5432/hvati_admin
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth-develop.hvati.cloud/realms/hvati

keycloak:
  admin:
    server-url: https://auth-develop.hvati.cloud
    realm: hvati
    client-id: ${KC_CLIENT_ID:hvati-backend}
    client-secret: ${KC_CLIENT_SECRET:JZ8qbTMWJz49eHyc4AbtKtouiaIov2ck}

app:
  cors:
    allowed-origins: http://localhost:4200

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
